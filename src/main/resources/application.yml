spring:
  application:
    name: veiculos-api

  datasource:
    url: jdbc:postgresql://localhost:5432/db_veiculos
    username: veiculos
    password: veiculos
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Configuração básica do Resource Server JWT para testes locais temporários
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/auth/realms/veiculos 