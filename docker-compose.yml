services:
  postgres:
    image: postgres:15-alpine
    container_name: veiculos-db
    environment:
      POSTGRES_DB: db_veiculos
      POSTGRES_USER: veiculos
      POSTGRES_PASSWORD: veiculos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: veiculos-cache
    ports:
      - "6379:6379"

volumes:
  pgdata: